[build]
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true

[[redirects]]
  from = "/kontakt.html"
  to = "/kontakt"
  status = 301

[[redirects]]
  from = "/referencie"
  to = "/realizacie"
  status = 301

[[redirects]]
  from = "/referencie/referencie-hydroizolacie"
  to = "/realizacie/hydroizolacie"
  status = 301

[[redirects]]
  from = "/referencie/referencie-oplastenia-budov"
  to = "/realizacie/oplastenia-budov"
  status = 301

[[redirects]]
  from = "/referencie/referencie-svetliky"
  to = "/realizacie/svetliky"
  status = 301

[[redirects]]
  from = "/referencie/referencie-rekonstrukcie-interierov-a-exterierov"
  to = "/realizacie/rekonstrukcie-interierov-a-exterierov"
  status = 301
